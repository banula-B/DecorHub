<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | DecorHub</title>
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Base Styles -->
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="navbar" style="background: rgba(20, 21, 24, 0.95);">
        <div class="container flex justify-between items-center">
            <a href="index.html" class="logo">
                <i class="fa-solid fa-gauge" style="color: var(--accent);"></i> DecorHub <span>Admin</span>
            </a>
            <nav class="nav-links">
                <a href="index.html" class="nav-link"><i class="fa-solid fa-store"></i> View Store</a>
                <button onclick="logout()" class="btn btn-secondary btn-sm" style="padding: 0.5rem 1rem;">
                    <i class="fa-solid fa-right-from-bracket"></i> Logout
                </button>
            </nav>
        </div>
    </header>

    <main class="container mt-8 mb-8" style="min-height: 80vh;">
        <div class="flex justify-between items-center mb-6">
            <h2><i class="fa-solid fa-boxes-stacked" style="color: var(--primary);"></i> Product Management</h2>
            <button onclick="openModal('addModal')" class="btn btn-primary">
                <i class="fa-solid fa-plus"></i> Add New Product
            </button>
        </div>

        <div class="glass-card w-full" style="padding: 0; overflow: hidden;">
            <div style="overflow-x: auto;">
                <table style="width: 100%; border-collapse: collapse; text-align: left;">
                    <thead>
                        <tr style="background: rgba(255,255,255,0.05); border-bottom: 1px solid var(--border-light);">
                            <th style="padding: 1.5rem; color: var(--text-muted); font-weight: 600;">ID</th>
                            <th style="padding: 1.5rem; color: var(--text-muted); font-weight: 600;">Product Details
                            </th>
                            <th style="padding: 1.5rem; color: var(--text-muted); font-weight: 600;">Price</th>
                            <th style="padding: 1.5rem; color: var(--text-muted); font-weight: 600; text-align: right;">
                                Actions</th>
                        </tr>
                    </thead>
                    <tbody id="admin-product-list">
                        <!-- Populated by JS -->
                        <tr>
                            <td colspan="4" class="text-center py-8">
                                <i class="fa-solid fa-circle-notch fa-spin fa-2x"></i>
                                <p class="mt-4">Loading inventory data...</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Orders Section -->
        <div id="orders-section" class="mt-12">
            <div class="flex justify-between items-center mb-6">
                <h2><i class="fa-solid fa-truck-fast" style="color: var(--secondary);"></i> Order Management</h2>
                <button onclick="loadAdminOrders()" class="btn btn-secondary">
                    <i class="fa-solid fa-arrows-rotate"></i> Refresh Orders
                </button>
            </div>

            <div class="glass-card w-full" style="padding: 0; overflow: hidden;">
                <div style="overflow-x: auto;">
                    <table style="width: 100%; border-collapse: collapse; text-align: left;">
                        <thead>
                            <tr
                                style="background: rgba(255,255,255,0.05); border-bottom: 1px solid var(--border-light);">
                                <th style="padding: 1.5rem; color: var(--text-muted); font-weight: 600;">Order ID</th>
                                <th style="padding: 1.5rem; color: var(--text-muted); font-weight: 600;">Customer</th>
                                <th style="padding: 1.5rem; color: var(--text-muted); font-weight: 600;">Date</th>
                                <th style="padding: 1.5rem; color: var(--text-muted); font-weight: 600;">Total</th>
                                <th style="padding: 1.5rem; color: var(--text-muted); font-weight: 600;">Status</th>
                                <th
                                    style="padding: 1.5rem; color: var(--text-muted); font-weight: 600; text-align: right;">
                                    Actions</th>
                            </tr>
                        </thead>
                        <tbody id="admin-order-list">
                            <tr>
                                <td colspan="6" class="text-center py-8">
                                    <i class="fa-solid fa-circle-notch fa-spin fa-2x"></i>
                                    <p class="mt-4">Loading operational data...</p>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <!-- Modal Form (Add/Edit) -->
    <div id="productModal" class="fixed inset-0 hidden items-center justify-center"
        style="position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); z-index: 100;">
        <div class="glass-card w-full" style="max-width: 500px; margin: 2rem;">
            <div class="flex justify-between items-center mb-6 border-b pb-4"
                style="border-bottom: 1px solid var(--border-light)">
                <h3 id="modalTitle"><i class="fa-solid fa-square-plus"></i> Add Product</h3>
                <button onclick="closeModal()" class="btn btn-secondary"
                    style="padding: 0.5rem; border-radius: 50%; width: 40px; height: 40px;">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>

            <form id="productForm">
                <input type="hidden" id="prod-id">

                <div class="form-group">
                    <label for="prod-name">Product Name</label>
                    <input type="text" id="prod-name" class="form-control" placeholder="e.g. Modern Table Lamp"
                        required>
                </div>

                <div class="form-group">
                    <label for="prod-price">Price ($)</label>
                    <input type="number" id="prod-price" class="form-control" placeholder="0.00" step="0.01" min="0"
                        required>
                </div>

                <div class="form-group">
                    <label for="prod-image">Image URL</label>
                    <input type="text" id="prod-image" class="form-control" placeholder="https://example.com/image.jpg">
                </div>

                <div class="form-group mb-6">
                    <label for="prod-desc">Description</label>
                    <textarea id="prod-desc" class="form-control" rows="4"
                        placeholder="Brief details about the product..." required
                        style="resize: vertical; min-height: 100px; font-family: inherit;"></textarea>
                </div>

                <div class="flex justify-end gap-4 mt-6">
                    <button type="button" onclick="closeModal()" class="btn btn-secondary">Cancel</button>
                    <button type="submit" class="btn btn-primary" id="saveProdBtn">
                        <i class="fa-solid fa-floppy-disk"></i> Save Product
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Toast container -->
    <div class="toast-container"></div>

    <!-- Scripts -->
    <script src="script.js"></script>
    <script src="admin.js"></script>
</body>

</html>
