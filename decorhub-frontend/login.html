<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | DecorHub</title>
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Base Styles -->
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="style.css">
</head>

<body class="flex items-center justify-center">

    <div class="glass-card w-full" style="max-width: 450px; margin: 2rem;">

        <div class="text-center mb-6">
            <a href="index.html" class="logo justify-center mb-4">
                <i class="fa-solid fa-couch"></i> Decor<span>Hub</span>
            </a>
            <h2>Welcome Back</h2>
            <p>Access your favorite collections</p>
        </div>

        <form id="login-form">
            <div class="form-group">
                <label for="email"><i class="fa-regular fa-envelope"></i> Email Address</label>
                <input id="email" class="form-control" type="email" placeholder="you@example.com" required>
            </div>

            <div class="form-group mb-8">
                <label for="password"><i class="fa-solid fa-lock"></i> Password</label>
                <input id="password" class="form-control" type="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn btn-primary w-full">
                Sign In
            </button>
        </form>

        <div class="text-center mt-6 pt-6" style="border-top: 1px solid var(--border-light)">
            <p>Don't have an account? <a href="signup.html" style="color: var(--primary); font-weight: 600;">Sign up</a>
            </p>
        </div>

        <div id="auth-loader" class="text-center mt-4 hidden">
            <i class="fa-solid fa-circle-notch fa-spin"></i> Authenticating...
        </div>
    </div>

    <!-- Toast container for notifications -->
    <div class="toast-container"></div>

    <script src="script.js"></script> <!-- Shared logic -->
    <script src="auth.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', function (e) {
            e.preventDefault();
            login();
        });
    </script>
</body>

</html>
